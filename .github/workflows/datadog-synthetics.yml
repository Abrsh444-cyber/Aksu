name: Datadog Synthetics

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  datadog-synthetics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

     "scripts": {
  "test": "vitest",  // or your preferred test runner
  "dev": "vite dev",
  // ... rest of scripts
}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./dist/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
          overwrite: false
          include-hidden-files: false
          archive: true
          
