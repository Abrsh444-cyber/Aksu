name: Build Android APK

# Builds the Aksum Academy Android app and uploads the .apk
# as a downloadable artifact you can grab from the Actions tab.
#
# Trigger manually from the Actions tab, or it runs automatically
# whenever capacitor config or this workflow changes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "capacitor.config.ts"
      - ".github/workflows/build-android-apk.yml"
      - "android/**"

jobs:
  build:
    name: Build unsigned debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install npm dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifact
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifact/aksum-academy.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aksum-academy-apk
          path: artifact/aksum-academy.apk
          if-no-files-found: error
          retention-days: 30
